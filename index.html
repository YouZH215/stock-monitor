<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A股股票监控</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
  * { box-sizing: border-box; margin:0; padding:0; }
  body { background: #0d1117; color: #e6edf3; font-family: 'Microsoft YaHei', sans-serif; min-height: 100vh; }

  #topbar {
    display: flex; align-items: center; flex-wrap: wrap; gap: 8px;
    padding: 10px 16px; background: #161b22; border-bottom: 1px solid #30363d;
    position: sticky; top: 0; z-index: 100;
  }
  #topbar h1 { font-size: 16px; color: #58a6ff; margin-right: 8px; white-space: nowrap; }
  .tb-group { display: flex; align-items: center; gap: 6px; }
  .tb-label { font-size: 12px; color: #8b949e; white-space: nowrap; }
  select, input[type=number], input[type=text] {
    background: #21262d; border: 1px solid #30363d; color: #e6edf3;
    border-radius: 4px; padding: 3px 7px; font-size: 13px;
  }
  button {
    background: #21262d; border: 1px solid #30363d; color: #e6edf3;
    border-radius: 4px; padding: 4px 10px; font-size: 12px; cursor: pointer;
    transition: background .15s;
  }
  button:hover { background: #30363d; }
  button.primary { background: #1f6feb; border-color: #1f6feb; color: #fff; }
  button.primary:hover { background: #388bfd; }
  button.danger { background: #da3633; border-color: #da3633; color: #fff; }
  button.danger:hover { background: #f85149; }
  #refreshBtn { min-width: 62px; }

  #addModuleBar {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    padding: 8px 16px; background: #0d1117; border-bottom: 1px solid #21262d;
  }
  #stockSearch { width: 200px; }
  #searchResult {
    position: absolute; background: #161b22; border: 1px solid #30363d;
    border-radius: 6px; z-index: 200; max-height: 220px; overflow-y: auto;
    min-width: 260px; box-shadow: 0 4px 16px #0006;
  }
  #searchResult .sr-item {
    padding: 6px 12px; cursor: pointer; font-size: 13px;
    display: flex; justify-content: space-between; gap: 8px;
  }
  #searchResult .sr-item:hover { background: #21262d; }
  #searchResult .sr-item .sr-code { color: #58a6ff; font-weight: bold; }
  #searchResult .sr-item .sr-name { color: #8b949e; }
  #searchWrapper { position: relative; }

  #moduleGrid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 12px; padding: 12px 16px;
  }

  .mod-card {
    background: #161b22; border: 1px solid #30363d; border-radius: 8px;
    display: flex; flex-direction: column; overflow: hidden;
    transition: border-color .15s;
  }
  .mod-card.drag-over { border-color: #58a6ff; }
  .mod-card.dragging { opacity: .4; }

  .mod-header {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 10px; background: #0d1117; cursor: move; user-select: none;
    border-bottom: 1px solid #21262d;
  }
  .mod-drag-handle { color: #8b949e; font-size: 14px; }
  .mod-name { font-size: 13px; font-weight: bold; flex: 1; color: #e6edf3; }
  .mod-name-input {
    font-size: 13px; font-weight: bold; flex: 1; background: transparent;
    border: none; border-bottom: 1px solid #388bfd; color: #e6edf3; outline: none;
    padding: 0; min-width: 60px;
  }
  .mod-btn { padding: 2px 6px; font-size: 11px; }

  .mod-body { padding: 6px 8px; }
  .stock-row {
    display: flex; align-items: center; gap: 6px; padding: 4px 4px;
    border-radius: 4px; cursor: pointer; transition: background .1s;
    font-size: 13px; position: relative;
  }
  .stock-row:hover { background: #21262d; }
  .stock-row.active { background: #1f2d3d; }
  .stock-code { color: #8b949e; font-size: 11px; width: 70px; flex-shrink: 0; }
  .stock-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .stock-price { font-weight: bold; width: 66px; text-align: right; }
  .stock-change { width: 64px; text-align: right; }
  .up   { color: #f85149; }
  .down { color: #3fb950; }
  .flat { color: #8b949e; }
  .stock-del { color: #8b949e; cursor: pointer; font-size: 14px; padding: 0 2px; opacity: 0; transition: opacity .1s; }
  .stock-row:hover .stock-del { opacity: 1; }

  #chartPanel {
    position: fixed; right: 0; top: 0; width: 520px; height: 100vh;
    background: #161b22; border-left: 1px solid #30363d;
    display: none; flex-direction: column; z-index: 300;
  }
  #chartPanel.open { display: flex; }
  #chartPanelHeader {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 14px; border-bottom: 1px solid #21262d; background: #0d1117;
  }
  #chartPanelTitle { flex: 1; font-size: 14px; font-weight: bold; }
  #chartTabs { display: flex; gap: 4px; }
  .chart-tab {
    padding: 3px 10px; border-radius: 4px; font-size: 12px; cursor: pointer;
    background: #21262d; border: 1px solid #30363d; color: #8b949e;
  }
  .chart-tab.active { background: #1f6feb; border-color: #1f6feb; color: #fff; }
  #chartClose { padding: 3px 8px; }
  #chartMain { flex: 1; }

  #modSearchOverlay {
    display: none; position: fixed; inset: 0; z-index: 400;
    background: rgba(0,0,0,0.5);
  }
  #modSearchBox {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    background: #161b22; border: 1px solid #30363d; border-radius: 8px;
    padding: 16px; width: 320px;
  }
  #modSearchBox h3 { margin-bottom: 10px; font-size: 14px; }
  #modSearchInput { width: 100%; margin-bottom: 8px; padding: 6px 10px; }
  #modSearchResult { max-height: 200px; overflow-y: auto; }
  #modSearchResult .sr-item { padding: 6px 8px; cursor: pointer; border-radius: 4px; font-size: 13px; display: flex; gap: 8px; }
  #modSearchResult .sr-item:hover { background: #21262d; }

  .empty-hint { color: #8b949e; font-size: 12px; padding: 8px 4px; text-align: center; }

  #addModuleBar { position: relative; }
</style>
</head>
<body>

<div id="topbar">
  <h1>📈 A股监控</h1>
  <div class="tb-group">
    <span class="tb-label">刷新间隔</span>
    <select id="intervalSel">
      <option value="0">手动</option>
      <option value="10000">10秒</option>
      <option value="30000" selected>30秒</option>
      <option value="60000">1分钟</option>
      <option value="300000">5分钟</option>
    </select>
  </div>
  <div class="tb-group">
    <span class="tb-label">涨跌色</span>
    <select id="colorScheme">
      <option value="cn">红涨绿跌（A股）</option>
      <option value="us">绿涨红跌（欧美）</option>
    </select>
  </div>
  <div class="tb-group">
    <span class="tb-label">科创板</span>
    <select id="kcFilter">
      <option value="show">显示</option>
      <option value="hide">隐藏</option>
    </select>
  </div>
  <button id="refreshBtn" class="primary" onclick="refreshAll()">刷新</button>
  <span id="lastUpdate" style="font-size:11px;color:#8b949e;"></span>
</div>

<div id="addModuleBar">
  <span class="tb-label">添加模块：</span>
  <div id="searchWrapper">
    <input id="stockSearch" type="text" placeholder="搜索股票代码/名称/拼音…" autocomplete="off"
      oninput="onGlobalSearch(this.value)" onfocus="onGlobalSearch(this.value)">
    <div id="searchResult" style="display:none"></div>
  </div>
  <button class="primary" id="addModBtn" onclick="addModule()">＋ 新建空白模块</button>
</div>

<div id="moduleGrid"></div>

<div id="chartPanel">
  <div id="chartPanelHeader">
    <span id="chartPanelTitle">-</span>
    <div id="chartTabs">
      <div class="chart-tab active" onclick="switchTab('minute')">分时</div>
      <div class="chart-tab" onclick="switchTab('daily')">日K</div>
      <div class="chart-tab" onclick="switchTab('weekly')">周K</div>
      <div class="chart-tab" onclick="switchTab('monthly')">月K</div>
    </div>
    <button id="chartClose" onclick="closeChart()">✕</button>
  </div>
  <div id="chartMain"></div>
</div>

<div id="modSearchOverlay" onclick="closeModSearch(event)">
  <div id="modSearchBox">
    <h3>向模块添加股票</h3>
    <input id="modSearchInput" type="text" placeholder="代码/名称/拼音…" autocomplete="off"
      oninput="onModSearch(this.value)">
    <div id="modSearchResult"></div>
    <div style="margin-top:10px;text-align:right">
      <button onclick="closeModSearch()">取消</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════
//  常量 & 状态
// ════════════════════════════════════════════════════
const STORAGE_KEY = 'stock_monitor_v3';

// 搜索 API：添加 &cb=? 占位符，jsonp() 才能正确注入回调名
const EF_SUGGEST  = 'https://searchapi.eastmoney.com/api/suggest/get?input={Q}&type=14&token=D43BF722C8E33BDC906FB84D85E326278&count=10&cb=?';
const EF_REALTIME = 'https://push2.eastmoney.com/api/qt/ulist.np/get?fltt=2&invt=2&fields=f12,f14,f2,f3,f4,f1,f15,f16,f17,f18&secids={SECIDS}&cb=?';
const EF_MINUTE   = 'https://push2.eastmoney.com/api/qt/stock/trends2/get?secid={SECID}&fields1=f1,f2,f3,f4,f5,f6,f7,f8,f9,f10,f11&fields2=f51,f52,f53,f54,f55,f56,f57,f58&iscr=0&cb=?';
const EF_KLINE    = 'https://push2.eastmoney.com/api/qt/stock/kline/get?secid={SECID}&fields1=f1,f2,f3,f4,f5,f6&fields2=f51,f52,f53,f54,f55,f56,f57,f58,f59,f60,f61&klt={KLT}&fqt=1&lmt=200&cb=?';

let state = load();
let chartInst = null;
let currentTab = 'minute';
let currentStock = null;
let refreshTimer = null;
let currentModTarget = null;
let globalSearchTimeout = null;
let modSearchTimeout = null;

// ════════════════════════════════════════════════════
//  持久化
// ════════════════════════════════════════════════════
function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const d = JSON.parse(raw);
      if (!d.modules) d.modules = [];
      if (!d.colorScheme) d.colorScheme = 'cn';
      if (!d.kcFilter) d.kcFilter = 'show';
      if (d.interval === undefined) d.interval = 30000;
      return d;
    }
  } catch(e) {}
  return {
    modules: [
      { id: uid(), name: '自选股', stocks: [] }
    ],
    colorScheme: 'cn',
    kcFilter: 'show',
    interval: 30000
  };
}
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

// ════════════════════════════════════════════════════
//  初始化
// ════════════════════════════════════════════════════
function init() {
  document.getElementById('colorScheme').value = state.colorScheme;
  document.getElementById('kcFilter').value = state.kcFilter;
  document.getElementById('intervalSel').value = String(state.interval);
  document.getElementById('colorScheme').onchange = function(e) { state.colorScheme = e.target.value; save(); renderAll(); };
  document.getElementById('kcFilter').onchange = function(e) { state.kcFilter = e.target.value; save(); renderAll(); };
  document.getElementById('intervalSel').onchange = function(e) { state.interval = +e.target.value; save(); restartTimer(); };
  document.addEventListener('click', function(e) {
    if (!e.target.closest('#searchWrapper')) hideGlobalSearch();
  });
  renderAll();
  refreshAll();
  restartTimer();
}

// ════════════════════════════════════════════════════
//  颜色辅助
// ════════════════════════════════════════════════════
function upColor()   { return state.colorScheme === 'cn' ? '#f85149' : '#3fb950'; }
function downColor() { return state.colorScheme === 'cn' ? '#3fb950' : '#f85149'; }
function changeClass(pct) {
  if (pct > 0) return 'up';
  if (pct < 0) return 'down';
  return 'flat';
}
function fmtChange(v) {
  if (v === undefined || v === null || v === '-' || isNaN(v)) return '-';
  const n = parseFloat(v);
  if (isNaN(n)) return '-';
  return (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
}
function fmtPrice(v) {
  if (v === undefined || v === null || v === '-') return '-';
  const n = parseFloat(v);
  if (isNaN(n) || n <= 0) return '-';
  return n.toFixed(2);
}

// ════════════════════════════════════════════════════
//  市场前缀辅助
// ════════════════════════════════════════════════════
function getSecid(code, market) {
  if (market !== undefined && market !== null) return market + '.' + code;
  if (code.startsWith('6')) return '1.' + code;
  if (code.startsWith('0') || code.startsWith('3')) return '0.' + code;
  return '0.' + code;
}
function isKcb(code) {
  return code.startsWith('688') || code.startsWith('689');
}

// ════════════════════════════════════════════════════
//  渲染
// ════════════════════════════════════════════════════
function renderAll() {
  var grid = document.getElementById('moduleGrid');
  grid.innerHTML = '';
  state.modules.forEach(function(mod) { grid.appendChild(makeModCard(mod)); });
  initDragDrop();
}

function makeModCard(mod) {
  var card = document.createElement('div');
  card.className = 'mod-card';
  card.dataset.id = mod.id;
  card.draggable = true;

  var hdr = document.createElement('div');
  hdr.className = 'mod-header';
  hdr.innerHTML =
    '<span class="mod-drag-handle">⠿</span>' +
    '<span class="mod-name" id="modname-' + mod.id + '">' + escHtml(mod.name) + '</span>' +
    '<button class="mod-btn" onclick="renameModStart(\'' + mod.id + '\')">✏</button>' +
    '<button class="mod-btn primary" onclick="openModSearch(\'' + mod.id + '\')">＋股票</button>' +
    '<button class="mod-btn danger" onclick="deleteModule(\'' + mod.id + '\')">✕</button>';
  card.appendChild(hdr);

  var body = document.createElement('div');
  body.className = 'mod-body';
  body.id = 'modbody-' + mod.id;

  var visible = mod.stocks.filter(function(s) {
    if (state.kcFilter === 'hide' && isKcb(s.code)) return false;
    return true;
  });

  if (visible.length === 0) {
    body.innerHTML = '<div class="empty-hint">暂无股票，点击 ＋股票 添加</div>';
  } else {
    visible.forEach(function(s) {
      body.appendChild(makeStockRow(s, mod.id));
    });
  }
  card.appendChild(body);
  return card;
}

function makeStockRow(s, modId) {
  var row = document.createElement('div');
  row.className = 'stock-row' + (currentStock && currentStock.code === s.code ? ' active' : '');
  row.id = 'stockrow-' + s.code;
  row.onclick = function() { openChart(s); };

  var priceTxt = fmtPrice(s.price);
  var changeTxt = fmtChange(s.changePct);
  var cls = changeClass(parseFloat(s.changePct));

  row.innerHTML =
    '<span class="stock-code">' + escHtml(s.code) + '</span>' +
    '<span class="stock-name">' + escHtml(s.name) + '</span>' +
    '<span class="stock-price ' + cls + '">' + priceTxt + '</span>' +
    '<span class="stock-change ' + cls + '">' + changeTxt + '</span>' +
    '<span class="stock-del" title="删除" onclick="delStockFromMod(event,\'' + modId + '\',\'' + s.code + '\')">✕</span>';
  return row;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ════════════════════════════════════════════════════
//  模块操作
// ════════════════════════════════════════════════════
function addModule() {
  var mod = { id: uid(), name: '新模块', stocks: [] };
  state.modules.push(mod);
  save();
  renderAll();
}

function deleteModule(id) {
  if (!confirm('确认删除此模块及其所有股票？')) return;
  state.modules = state.modules.filter(function(m) { return m.id !== id; });
  save();
  renderAll();
}

function renameModStart(id) {
  var nameEl = document.getElementById('modname-' + id);
  if (!nameEl) return;
  var old = (state.modules.find(function(m) { return m.id === id; }) || {}).name || '';
  var inp = document.createElement('input');
  inp.className = 'mod-name-input';
  inp.value = old;
  inp.onblur = function() { renameModEnd(id, inp.value); };
  inp.onkeydown = function(e) { if (e.key === 'Enter') inp.blur(); if (e.key === 'Escape') { inp.value = old; inp.blur(); } };
  nameEl.parentNode.replaceChild(inp, nameEl);
  inp.focus();
  inp.select();
}

function renameModEnd(id, name) {
  var mod = state.modules.find(function(m) { return m.id === id; });
  if (mod) { mod.name = name.trim() || mod.name; save(); }
  renderAll();
}

// ════════════════════════════════════════════════════
//  拖拽排序
// ════════════════════════════════════════════════════
var dragSrc = null;
function initDragDrop() {
  document.querySelectorAll('.mod-card').forEach(function(card) {
    card.addEventListener('dragstart', function(e) {
      dragSrc = card;
      setTimeout(function() { card.classList.add('dragging'); }, 0);
      e.dataTransfer.effectAllowed = 'move';
    });
    card.addEventListener('dragend', function() {
      card.classList.remove('dragging');
      document.querySelectorAll('.mod-card').forEach(function(c) { c.classList.remove('drag-over'); });
    });
    card.addEventListener('dragover', function(e) {
      e.preventDefault();
      if (card !== dragSrc) {
        document.querySelectorAll('.mod-card').forEach(function(c) { c.classList.remove('drag-over'); });
        card.classList.add('drag-over');
      }
    });
    card.addEventListener('drop', function(e) {
      e.preventDefault();
      if (dragSrc && dragSrc !== card) {
        var ids = [];
        document.querySelectorAll('.mod-card').forEach(function(c) { ids.push(c.dataset.id); });
        var srcIdx = -1;
        var dstIdx = -1;
        state.modules.forEach(function(m, i) { if (m.id === dragSrc.dataset.id) srcIdx = i; if (m.id === card.dataset.id) dstIdx = i; });
        if (srcIdx >= 0 && dstIdx >= 0) {
          var moved = state.modules.splice(srcIdx, 1);
          state.modules.splice(dstIdx, 0, moved[0]);
          save();
          renderAll();
        }
      }
    });
  });
}

// ════════════════════════════════════════════════════
//  全局搜索（顶部栏）
// ════════════════════════════════════════════════════
function onGlobalSearch(q) {
  clearTimeout(globalSearchTimeout);
  if (!q.trim()) { hideGlobalSearch(); return; }
  globalSearchTimeout = setTimeout(function() { doSearch(q, 'global'); }, 300);
}

function hideGlobalSearch() {
  document.getElementById('searchResult').style.display = 'none';
}

function doSearch(q, target) {
  var url = EF_SUGGEST.replace('{Q}', encodeURIComponent(q));
  jsonp(url).then(function(res) {
    var items = (res && res.QuotationCodeTable && res.QuotationCodeTable.Data) || [];
    var stocks = items.filter(function(it) {
      var t = String(it.MktNum || '');
      var c = String(it.Code || '');
      return (t === '0' || t === '1') && /^\d{6}$/.test(c);
    }).slice(0, 8);

    if (target === 'global') renderGlobalResult(stocks);
    else renderModSearchResult(stocks);
  }).catch(function(e) {
    console.warn('搜索失败', e);
  });
}

function renderGlobalResult(items) {
  var el = document.getElementById('searchResult');
  if (!items.length) { el.style.display = 'none'; return; }
  var html = '';
  items.forEach(function(it) {
    html += '<div class="sr-item" onclick="globalSelectStock(\'' + it.Code + '\',\'' + escHtml(it.Name) + '\',' + it.MktNum + ')">' +
      '<span class="sr-code">' + it.Code + '</span>' +
      '<span class="sr-name">' + escHtml(it.Name) + '</span>' +
      '</div>';
  });
  el.innerHTML = html;
  el.style.display = 'block';
}

function globalSelectStock(code, name, mkt) {
  hideGlobalSearch();
  document.getElementById('stockSearch').value = '';
  if (!state.modules.length) addModule();
  addStockToMod(state.modules[0].id, code, name, +mkt);
}

// ════════════════════════════════════════════════════
//  模块内搜索弹窗
// ════════════════════════════════════════════════════
function openModSearch(modId) {
  currentModTarget = modId;
  document.getElementById('modSearchInput').value = '';
  document.getElementById('modSearchResult').innerHTML = '';
  document.getElementById('modSearchOverlay').style.display = 'block';
  setTimeout(function() { document.getElementById('modSearchInput').focus(); }, 50);
}

function closeModSearch(e) {
  if (e && e.target !== document.getElementById('modSearchOverlay')) return;
  document.getElementById('modSearchOverlay').style.display = 'none';
  currentModTarget = null;
}

function onModSearch(q) {
  clearTimeout(modSearchTimeout);
  if (!q.trim()) { document.getElementById('modSearchResult').innerHTML = ''; return; }
  modSearchTimeout = setTimeout(function() { doSearch(q, 'mod'); }, 300);
}

function renderModSearchResult(items) {
  var el = document.getElementById('modSearchResult');
  if (!items.length) { el.innerHTML = '<div style="color:#8b949e;padding:8px;font-size:12px;">无结果</div>'; return; }
  var html = '';
  items.forEach(function(it) {
    html += '<div class="sr-item" onclick="modSelectStock(\'' + it.Code + '\',\'' + escHtml(it.Name) + '\',' + it.MktNum + ')">' +
      '<span class="sr-code">' + it.Code + '</span>' +
      '<span class="sr-name">' + escHtml(it.Name) + '</span>' +
      '</div>';
  });
  el.innerHTML = html;
}

function modSelectStock(code, name, mkt) {
  if (!currentModTarget) return;
  addStockToMod(currentModTarget, code, name, +mkt);
  document.getElementById('modSearchOverlay').style.display = 'none';
  currentModTarget = null;
}

function addStockToMod(modId, code, name, market) {
  var mod = state.modules.find(function(m) { return m.id === modId; });
  if (!mod) return;
  if (mod.stocks.find(function(s) { return s.code === code; })) { alert(code + ' 已在模块中'); return; }
  mod.stocks.push({ code: code, name: name, market: market, price: null, changePct: null });
  save();
  renderAll();
  fetchRealtime([{ code: code, market: market }]).then(function(data) {
    updateStockData(data);
    renderAll();
  });
}

function delStockFromMod(e, modId, code) {
  e.stopPropagation();
  var mod = state.modules.find(function(m) { return m.id === modId; });
  if (!mod) return;
  mod.stocks = mod.stocks.filter(function(s) { return s.code !== code; });
  save();
  renderAll();
}

// ════════════════════════════════════════════════════
//  行情刷新
// ════════════════════════════════════════════════════
function refreshAll() {
  var btn = document.getElementById('refreshBtn');
  btn.textContent = '刷新中…';
  btn.disabled = true;

  var allStocks = [];
  var seen = new Set();
  state.modules.forEach(function(mod) {
    mod.stocks.forEach(function(s) {
      if (!seen.has(s.code)) { seen.add(s.code); allStocks.push(s); }
    });
  });

  if (allStocks.length) {
    fetchRealtime(allStocks).then(function(data) {
      updateStockData(data);
      renderAll();
      btn.textContent = '刷新';
      btn.disabled = false;
      document.getElementById('lastUpdate').textContent = '更新: ' + new Date().toLocaleTimeString();
    }).catch(function(e) {
      console.warn('刷新失败', e);
      btn.textContent = '刷新';
      btn.disabled = false;
    });
  } else {
    btn.textContent = '刷新';
    btn.disabled = false;
  }
}

function fetchRealtime(stocks) {
  var secids = stocks.map(function(s) { return getSecid(s.code, s.market); }).join(',');
  var url = EF_REALTIME.replace('{SECIDS}', encodeURIComponent(secids));
  return jsonp(url).then(function(res) {
    return (res && res.data && res.data.diff) || [];
  });
}

function updateStockData(diff) {
  if (!diff || !diff.length) return;
  var map = {};
  diff.forEach(function(item) {
    var code = item.f12;
    if (code) map[code] = item;
  });
  state.modules.forEach(function(mod) {
    mod.stocks.forEach(function(s) {
      var item = map[s.code];
      if (item) {
        var rawPrice = item.f2;
        var rawChange = item.f3;
        s.price = (rawPrice && rawPrice !== '-' && parseFloat(rawPrice) > 0) ? rawPrice : s.price;
        s.changePct = (rawChange && rawChange !== '-') ? rawChange : s.changePct;
        s.name = item.f14 || s.name;
      }
    });
  });
  save();
}

function restartTimer() {
  clearInterval(refreshTimer);
  if (state.interval > 0) {
    refreshTimer = setInterval(refreshAll, state.interval);
  }
}

// ════════════════════════════════════════════════════
//  图表
// ════════════════════════════════════════════════════
function openChart(s) {
  currentStock = s;
  document.getElementById('chartPanel').classList.add('open');
  document.getElementById('chartPanelTitle').textContent = s.code + ' ' + s.name;
  document.querySelectorAll('.stock-row').forEach(function(r) { r.classList.remove('active'); });
  var row = document.getElementById('stockrow-' + s.code);
  if (row) row.classList.add('active');
  loadChart(s, currentTab);
}

function closeChart() {
  document.getElementById('chartPanel').classList.remove('open');
  currentStock = null;
  document.querySelectorAll('.stock-row').forEach(function(r) { r.classList.remove('active'); });
  if (chartInst) { chartInst.dispose(); chartInst = null; }
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.chart-tab').forEach(function(el, i) {
    el.classList.toggle('active', ['minute','daily','weekly','monthly'][i] === tab);
  });
  if (currentStock) loadChart(currentStock, tab);
}

function loadChart(s, tab) {
  var container = document.getElementById('chartMain');
  container.innerHTML = '<div style="color:#8b949e;text-align:center;padding-top:100px;font-size:13px;">加载中…</div>';
  if (chartInst) { chartInst.dispose(); chartInst = null; }
  if (tab === 'minute') {
    loadMinuteChart(s, container);
  } else {
    var klt = tab === 'daily' ? 101 : tab === 'weekly' ? 102 : 103;
    loadKlineChart(s, container, klt, tab);
  }
}

function loadMinuteChart(s, container) {
  var secid = getSecid(s.code, s.market);
  var url = EF_MINUTE.replace('{SECID}', secid);
  jsonp(url).then(function(res) {
    var trends = (res && res.data && res.data.trends) || [];
    if (!trends.length) { container.innerHTML = '<div style="color:#8b949e;text-align:center;padding-top:100px;">暂无分时数据</div>'; return; }

    var times = [], prices = [], avgs = [], vols = [];
    trends.forEach(function(t) {
      var p = t.split(',');
      times.push(p[0].split(' ')[1]);
      prices.push(parseFloat(p[1]));
      avgs.push(parseFloat(p[2]));
      vols.push(parseFloat(p[5]));
    });
    var preClose = parseFloat((res.data && res.data.preClose) || prices[0]);

    container.innerHTML = '';
    chartInst = echarts.init(container, 'dark');
    chartInst.setOption({
      backgroundColor: '#161b22',
      tooltip: { trigger: 'axis', axisPointer: { type: 'cross' } },
      legend: { data: ['价格','均价'], textStyle: { color: '#8b949e' }, top: 4 },
      grid: [{ left: 50, right: 12, top: 40, bottom: 80 }, { left: 50, right: 12, height: 50, bottom: 20 }],
      xAxis: [
        { type: 'category', data: times, axisLabel: { color: '#8b949e', fontSize: 10 }, gridIndex: 0 },
        { type: 'category', data: times, axisLabel: { show: false }, gridIndex: 1 }
      ],
      yAxis: [
        { type: 'value', scale: true, axisLabel: { color: '#8b949e', fontSize: 10 }, splitLine: { lineStyle: { color: '#21262d' } }, gridIndex: 0 },
        { type: 'value', axisLabel: { show: false }, splitLine: { show: false }, gridIndex: 1 }
      ],
      series: [
        { name: '价格', type: 'line', data: prices, smooth: false, symbol: 'none',
          lineStyle: { color: upColor(), width: 1.5 },
          areaStyle: { color: { type: 'linear', x: 0, y: 0, x2: 0, y2: 1, colorStops: [{ offset: 0, color: upColor() + '44' }, { offset: 1, color: 'transparent' }] } },
          xAxisIndex: 0, yAxisIndex: 0,
          markLine: { data: [{ yAxis: preClose, lineStyle: { color: '#8b949e', type: 'dashed' } }], label: { show: false } },
        { name: '均价', type: 'line', data: avgs, smooth: false, symbol: 'none',
          lineStyle: { color: '#d29922', width: 1 }, xAxisIndex: 0, yAxisIndex: 0 },
        { name: '成交量', type: 'bar', data: vols, itemStyle: { color: '#388bfd44' }, xAxisIndex: 1, yAxisIndex: 1 }
      ]
    });
  }).catch(function(e) {
    container.innerHTML = '<div style="color:#f85149;text-align:center;padding-top:100px;font-size:13px;">加载失败: ' + e.message + '</div>';
  });
}

function loadKlineChart(s, container, klt, tab) {
  var secid = getSecid(s.code, s.market);
  var url = EF_KLINE.replace('{SECID}', secid).replace('{KLT}', klt);
  jsonp(url).then(function(res) {
    var klines = (res && res.data && res.data.klines) || [];
    if (!klines.length) { container.innerHTML = '<div style="color:#8b949e;text-align:center;padding-top:100px;">暂无K线数据</div>'; return; }

    var dates = [], opens = [], closes = [], lows = [], highs = [], vols = [];
    klines.forEach(function(k) {
      var p = k.split(',');
      dates.push(p[0]);
      opens.push(parseFloat(p[1]));
      closes.push(parseFloat(p[2]));
      highs.push(parseFloat(p[3]));
      lows.push(parseFloat(p[4]));
      vols.push(parseFloat(p[5]));
    });

    container.innerHTML = '';
    chartInst = echarts.init(container, 'dark');
    chartInst.setOption({
      backgroundColor: '#161b22',
      tooltip: { trigger: 'axis', axisPointer: { type: 'cross' } },
      legend: { data: ['K线','MA5','MA20'], textStyle: { color: '#8b949e' }, top: 4 },
      grid: [{ left: 60, right: 12, top: 40, bottom: 90 }, { left: 60, right: 12, height: 55, bottom: 28 }],
      xAxis: [
        { type: 'category', data: dates, axisLabel: { color: '#8b949e', fontSize: 10, rotate: 20 }, gridIndex: 0 },
        { type: 'category', data: dates, axisLabel: { show: false }, gridIndex: 1 }
      ],
      yAxis: [
        { type: 'value', scale: true, axisLabel: { color: '#8b949e', fontSize: 10 }, splitLine: { lineStyle: { color: '#21262d' } }, gridIndex: 0 },
        { type: 'value', axisLabel: { show: false }, splitLine: { show: false }, gridIndex: 1 }
      ],
      dataZoom: [
        { type: 'inside', xAxisIndex: [0,1], start: Math.max(0, 100 - 80), end: 100 },
        { type: 'slider', xAxisIndex: [0,1], bottom: 4, height: 20, fillerColor: '#1f6feb44', borderColor: '#30363d', textStyle: { color: '#8b949e', fontSize: 10 } }
      ],
      series: [
        { name: 'K线', type: 'candlestick',
          data: dates.map(function(d, i) { return [opens[i], closes[i], lows[i], highs[i]]; }),
          itemStyle: { color: upColor(), color0: downColor(), borderColor: upColor(), borderColor0: downColor() },
          xAxisIndex: 0, yAxisIndex: 0 },
        { name: 'MA5', type: 'line', data: calcMA(closes, 5), smooth: true, symbol: 'none', lineStyle: { color: '#d29922', width: 1 }, xAxisIndex: 0, yAxisIndex: 0 },
        { name: 'MA20', type: 'line', data: calcMA(closes, 20), smooth: true, symbol: 'none', lineStyle: { color: '#58a6ff', width: 1 }, xAxisIndex: 0, yAxisIndex: 0 },
        { name: '成交量', type: 'bar',
          data: vols.map(function(v, i) { return { value: v, itemStyle: { color: closes[i] >= opens[i] ? upColor() + '88' : downColor() + '88' } }; }),
          xAxisIndex: 1, yAxisIndex: 1 }
      ]
    });
  }).catch(function(e) {
    container.innerHTML = '<div style="color:#f85149;text-align:center;padding-top:100px;font-size:13px;">加载失败: ' + e.message + '</div>';
  });
}

function calcMA(data, n) {
  return data.map(function(v, i) {
    if (i < n - 1) return null;
    var sum = 0;
    for (var j = i - n + 1; j <= i; j++) sum += data[j];
    return +(sum / n).toFixed(3);
  });
}

// ════════════════════════════════════════════════════
//  JSONP 工具（修复版）
// ════════════════════════════════════════════════════
function jsonp(url, timeout) {
  timeout = timeout || 8000;
  return new Promise(function(resolve, reject) {
    var cbName = 'cb_' + uid();
    var timer = setTimeout(function() {
      delete window[cbName];
      if (script.parentNode) document.head.removeChild(script);
      reject(new Error('JSONP timeout'));
    }, timeout);

    window[cbName] = function(data) {
      clearTimeout(timer);
      delete window[cbName];
      if (script.parentNode) document.head.removeChild(script);
      resolve(data);
    };

    var script = document.createElement('script');
    script.src = url.replace('cb=?', 'cb=' + cbName).replace('callback=?', 'callback=' + cbName);
    script.onerror = function() {
      clearTimeout(timer);
      delete window[cbName];
      if (script.parentNode) document.head.removeChild(script);
      reject(new Error('JSONP error'));
    };
    document.head.appendChild(script);
  });
}

window.addEventListener('DOMContentLoaded', init);
window.addEventListener('resize', function() { if (chartInst) chartInst.resize(); });
